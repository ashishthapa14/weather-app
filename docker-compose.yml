version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: weather_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: weather_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  # Backend and frontend will be run locally during development
  # but this file can be expanded later for full containerization.

volumes:
  db_data:
