spring:
  application:
    name: weather-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:weather_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      transaction-isolation: TRANSACTION_READ_COMMITTED

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  ai:
    openai:
      api-key: ${GROQ_API_KEY:your_groq_api_key_here}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant

server:
  port: 8080
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

weather:
  api:
    key: ${OPENWEATHERMAP_API_KEY:your_openweather_api_key_here}
    base-url: https://api.openweathermap.org/data/2.5
